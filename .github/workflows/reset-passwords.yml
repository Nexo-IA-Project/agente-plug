name: Reset Passwords (temporary)

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: [self-hosted, production]
    steps:
      - name: Find project and reset passwords
        run: |
          PROJECT=$(find /home /opt /srv /var/www -maxdepth 8 -name "pyproject.toml" -path "*/nexo-flow*" 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
          echo "Project: $PROJECT"
          cd "$PROJECT"
          uv run python -c "
          import asyncio, sys
          sys.path.insert(0, 'src')
          from shared.adapters.db.session import session_scope
          from sqlalchemy import text
          updates = [
              ('suporte@ianexo.com.br',  '\$2b\$12\$Uj26hcB5n2lzDkBXkmAwx.X4MWORwVvCVnKDATiK5X63zETNp36Z6'),
              ('fabio.dias@ianexo.com.br','\$2b\$12\$hUuD5U/hDbkLfCNt39V1oOSlKOoRHnxPAf0k4VqH0BxBFulZ2D4ie'),
          ]
          async def run():
              for email, h in updates:
                  async with session_scope() as s:
                      r = await s.execute(text('UPDATE users SET password_hash=:h, must_change_password=FALSE WHERE email=:e'), {'h': h, 'e': email})
                      await s.commit()
                  print(f'updated {email}: {r.rowcount} row(s)')
          asyncio.run(run())
          "
