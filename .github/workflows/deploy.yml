name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/agente-plug-api

jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_APP_TAILSCALE_IP }}
          username: root
          password: ${{ secrets.SERVER_APP_SSH_PASS }}
          script: |
            cd /root/agente-plug
            IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}

            # Pull nova imagem
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull

            # Aplicar migrations antes de subir nova versão
            docker run --rm \
              --env-file /root/.env.prod \
              --network host \
              ghcr.io/${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
              alembic upgrade head

            # Subir nova versão (zero-downtime: recria containers um a um)
            docker compose -f docker-compose.prod.yml up -d --force-recreate api worker

            # Aguardar healthcheck
            sleep 10
            docker compose -f docker-compose.prod.yml ps
