name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository_owner }}/agente-plug-api
  IMAGE_WEB: ${{ github.repository_owner }}/agente-plug-web

jobs:
  # ============================================================================
  # CI Gates — rodam em push e pull_request
  # ============================================================================

  lint:
    name: CI Gates / Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install API dependencies
        working-directory: apps/api
        run: uv sync --frozen

      - name: Ruff format (api)
        working-directory: apps/api
        run: uv run ruff format --check src tests

      - name: Ruff lint (api)
        working-directory: apps/api
        run: uv run ruff check src tests

  typecheck:
    name: CI Gates / Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install API dependencies
        working-directory: apps/api
        run: uv sync --frozen

      - name: mypy (api)
        working-directory: apps/api
        run: |
          uv run mypy \
            src/agent/context.py \
            src/agent/history.py \
            src/agent/tool_registry.py \
            src/agent/skill.py \
            src/agent/runner.py \
            src/agent/prompt.py \
            src/agent/guards/loop_detector.py \
            src/interface/http/routers/admin/dlq.py \
            src/shared/adapters/kb/knowledge_adapter.py \
            src/interface/worker/dispatcher.py \
            src/interface/worker/handlers/message.py

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: tsc --noEmit (web)
        working-directory: apps/web
        run: npx --no-install tsc --noEmit

  test:
    name: CI Gates / Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --frozen

      - name: Run unit tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          REDIS_URL: redis://localhost:6379/0
          OPENAI_API_KEY: sk-test
          CHATNEXO_BASE_URL: http://localhost:4000
          CHATNEXO_API_KEY: test
          HUBLA_WEBHOOK_SECRET: test
          ADMIN_API_KEY: test
          META_API_KEY: test
          INTEGRATION_CREDENTIALS_KEY: dGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0dGVzdA==
          JWT_SECRET: test-jwt-secret-with-enough-entropy-for-ci
        run: uv run pytest tests/unit -x -q

  security-audit:
    name: CI Gates / Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Export API requirements
        working-directory: apps/api
        run: uv export --no-dev --no-hashes --no-emit-project -o /tmp/requirements.txt

      - name: pip-audit (api)
        run: uvx pip-audit -r /tmp/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: npm audit (web)
        working-directory: apps/web
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  docker-build-check:
    name: CI Gates / Docker Build Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: api
            context: apps/api
            scope: api
          - target: worker
            context: apps/api
            scope: api
          - target: web
            context: apps/web
            scope: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push) — ${{ matrix.target }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: agente-plug-${{ matrix.target }}:ci
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}

      - name: Smoke test — worker entrypoint
        if: matrix.target == 'worker'
        run: |
          docker run --rm --entrypoint python agente-plug-worker:ci \
            -c "import worker; print('worker module importable')"

  # ============================================================================
  # Build & Push — só em push para main, depois dos gates passarem
  # ============================================================================

  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security-audit, docker-build-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      actions: write

    outputs:
      image_tag: ${{ steps.meta-api.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (api)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (api)
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push (web)
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ============================================================================
  # Deploy — só em push para main, depois do build-push
  # ============================================================================

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
          IMAGE_API_REF: ghcr.io/${{ env.IMAGE_API }}
        run: |
          set -euo pipefail
          cd /root/agente-plug

          # Sincronizar repo (puxa docker-compose.prod.yml e outros configs atualizados)
          git pull --ff-only

          # GHCR exige lowercase — normaliza o owner que pode ter maiúsculas
          IMAGE_API_LC=$(echo "${IMAGE_API_REF}" | tr '[:upper:]' '[:lower:]')

          # Pull novas imagens
          docker compose --env-file /root/.env.prod -f docker-compose.prod.yml pull

          # Aplicar migrations antes de subir nova versão
          docker run --rm \
            --env-file /root/.env.prod \
            --network host \
            "${IMAGE_API_LC}:${IMAGE_TAG}" \
            alembic upgrade heads

          # Subir nova versão (recria containers um a um)
          docker compose --env-file /root/.env.prod -f docker-compose.prod.yml up -d --force-recreate api worker web

          # Aguardar até api ficar healthy (max 90s)
          echo "Aguardando API ficar healthy..."
          for i in $(seq 1 18); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose --env-file /root/.env.prod -f docker-compose.prod.yml ps -q api)" 2>/dev/null || echo "unknown")
            echo "  [${i}/18] api health: ${STATUS}"
            if [ "${STATUS}" = "healthy" ]; then
              echo "API healthy!"
              break
            fi
            if [ "${i}" = "18" ]; then
              echo "ERRO: API não ficou healthy em 90s"
              docker compose --env-file /root/.env.prod -f docker-compose.prod.yml logs --tail=50 api
              exit 1
            fi
            sleep 5
          done

          docker compose --env-file /root/.env.prod -f docker-compose.prod.yml ps

          # Smoke test: verificar health via Cloudflare Tunnel
          echo "Smoke test..."
          for i in 1 2 3; do
            if curl -sf --max-time 10 https://api-iag2.ianexo.com.br/health | grep -q '"ok"'; then
              echo "Smoke test passou!"
              break
            fi
            echo "  tentativa ${i}/3 falhou, aguardando 10s..."
            sleep 10
            if [ "${i}" = "3" ]; then
              echo "AVISO: smoke test não confirmou /health via túnel (pode ser latência DNS)"
            fi
          done
