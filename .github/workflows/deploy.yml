name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository_owner }}/nexo-flow-api
  IMAGE_WEB: ${{ github.repository_owner }}/nexo-flow-web

jobs:
  # ============================================================================
  # CI Gates — rodam em push e pull_request
  # ============================================================================

  lint:
    name: CI Gates / Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install API dependencies
        working-directory: apps/api
        run: uv sync --frozen

      - name: Ruff format (api)
        working-directory: apps/api
        run: uv run ruff format --check src tests

      - name: Ruff lint (api)
        working-directory: apps/api
        run: uv run ruff check src tests

  typecheck:
    name: CI Gates / Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install API dependencies
        working-directory: apps/api
        run: uv sync --frozen

      - name: mypy (api)
        working-directory: apps/api
        run: |
          uv run mypy \
            src/agent/context.py \
            src/agent/history.py \
            src/agent/tool_registry.py \
            src/agent/skill.py \
            src/agent/runner.py \
            src/agent/prompt.py \
            src/agent/guards/loop_detector.py \
            src/interface/http/routers/admin/dlq.py \
            src/shared/adapters/kb/knowledge_adapter.py \
            src/interface/worker/dispatcher.py \
            src/interface/worker/handlers/message.py

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: tsc --noEmit (web)
        working-directory: apps/web
        run: npx --no-install tsc --noEmit

  test:
    name: CI Gates / Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --frozen

      - name: Run unit tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          REDIS_URL: redis://localhost:6379/0
          OPENAI_API_KEY: sk-test
          CHATNEXO_BASE_URL: http://localhost:4000
          CHATNEXO_API_KEY: test
          CHATNEXO_INBOX_ID: 113
          HUBLA_WEBHOOK_SECRET: test
          ADMIN_API_KEY: test
          META_API_KEY: test
          INTEGRATION_CREDENTIALS_KEY: dGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0dGVzdA==
          JWT_SECRET: test-jwt-secret-with-enough-entropy-for-ci
        run: uv run pytest tests/unit -x -q

  security-audit:
    name: CI Gates / Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Export API requirements
        working-directory: apps/api
        run: uv export --no-dev --no-hashes --no-emit-project -o /tmp/requirements.txt

      - name: pip-audit (api)
        run: uvx pip-audit -r /tmp/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: npm audit (web)
        working-directory: apps/web
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  docker-build-check:
    name: CI Gates / Docker Build Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: api
            context: apps/api
            scope: api
          - target: worker
            context: apps/api
            scope: api
          - target: web
            context: apps/web
            scope: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push) — ${{ matrix.target }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: nexo-flow-${{ matrix.target }}:ci
          build-args: |
            NEXT_PUBLIC_API_URL=https://api-iag2.ianexo.com.br
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}

      - name: Smoke test — worker entrypoint
        if: matrix.target == 'worker'
        run: |
          docker run --rm --entrypoint python nexo-flow-worker:ci \
            -c "import worker; print('worker module importable')"

  # ============================================================================
  # Build & Push — só em push para main, depois dos gates passarem
  # ============================================================================

  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security-audit, docker-build-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      actions: write

    outputs:
      image_tag: ${{ steps.meta-api.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (api)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (api)
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push (web)
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api-iag2.ianexo.com.br
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ============================================================================
  # Deploy — só em push para main, depois do build-push
  # ============================================================================

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory /root/nexo-flow
          cd /root/nexo-flow
          # Busca só a branch main — evita tocar refs de outras branches
          # que podem ter permissões inconsistentes no servidor.
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          IMAGE_TAG="${IMAGE_TAG}" bash scripts/deploy.sh
