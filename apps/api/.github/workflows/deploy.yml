name: CI / Deploy

on:
  push:
    branches: ["main", "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ─── Gates (todo push / PR) ──────────────────────────────────────────────────

jobs:
  lint-api:
    name: Lint & Format (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5"
      - run: uv sync --frozen
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests

  typecheck-api:
    name: Type Check (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5"
      - run: uv sync --frozen
      - run: uv run mypy src

  test-api:
    name: Tests (api)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexoia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nexoia_test
      REDIS_URL: redis://localhost:6379/0
      OPENAI_API_KEY: sk-test-placeholder
      CHATNEXO_BASE_URL: http://localhost:9999
      CHATNEXO_API_KEY: test-key
      HUBLA_WEBHOOK_SECRET: test-secret
      ADMIN_API_KEY: test-admin-key
      META_API_KEY: test-meta-key
      META_WABA_ID: "123456789"
      INTEGRATION_CREDENTIALS_KEY: ${{ secrets.INTEGRATION_CREDENTIALS_KEY_TEST }}
      JWT_SECRET: test-jwt-secret
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5"
      - run: uv sync --frozen
      - run: uv run pytest tests/unit -x -q

  security-api:
    name: Security Audit (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5"
      - run: uv sync --frozen
      - run: uv run pip-audit

  build-docker:
    name: Docker Build (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: agente-plug-api:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─── Deploy (push para main após gates) ──────────────────────────────────────

  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: [lint-api, typecheck-api, test-api, security-api, build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (self-hosted)
    runs-on: [self-hosted, linux]
    needs: publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - name: Pull latest code
        run: git -C ${{ secrets.DEPLOY_PATH }} pull

      - name: Pull Docker image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Run migrations
        run: |
          docker run --rm \
            --env-file ${{ secrets.DEPLOY_PATH }}/.env.local \
            --network host \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            alembic upgrade heads

      - name: Start services
        run: |
          docker compose -f ${{ secrets.DEPLOY_PATH }}/docker-compose.prod.yml \
            up -d api worker

      - name: Health check (90s timeout)
        run: |
          for i in $(seq 1 18); do
            if curl -sf http://localhost:8000/health; then
              echo "API healthy"
              exit 0
            fi
            echo "Attempt $i/18 — waiting 5s..."
            sleep 5
          done
          echo "Health check failed after 90s"
          exit 1

      - name: Smoke test via Cloudflare Tunnel
        run: |
          curl -sf ${{ secrets.TUNNEL_API_URL }}/health | grep '"status":"ok"'
