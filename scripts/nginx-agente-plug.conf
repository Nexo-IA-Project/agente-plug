upstream api_backend { server 127.0.0.1:8001; }
upstream web_backend { server 127.0.0.1:3001; }

server {
    listen 8000;
    # Permite upload de mídia até o máximo da Meta (DOCUMENT = 100 MB).
    # Sem isso, o nginx rejeita com 413 em ~1 MB (default).
    client_max_body_size 110M;

    location / {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        # Timeouts maiores pra uploads grandes (até 100 MB)
        proxy_send_timeout 300s;
        client_body_timeout 300s;
    }
}

server {
    listen 3000;
    # Web SPA — mantém o default (1 MB já basta pra qualquer request normal).
    location / {
        proxy_pass         http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
    }
}
