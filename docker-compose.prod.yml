services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --bind 127.0.0.1
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      retries: 5

  api:
    image: ghcr.io/nexo-ia-project/agente-plug-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: /root/.env.prod
    depends_on:
      redis: { condition: service_healthy }
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 3

  worker:
    image: ghcr.io/nexo-ia-project/agente-plug-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: /root/.env.prod
    depends_on:
      redis: { condition: service_healthy }
    command: ["python", "-m", "worker"]

  web:
    image: ghcr.io/nexo-ia-project/agente-plug-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: /root/.env.prod
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/"]
      interval: 30s
      retries: 3
